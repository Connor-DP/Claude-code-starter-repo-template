name: Verify Task Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  verify:
    name: Task Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Detect project type from settings.json
      - name: Detect project type
        id: detect
        run: |
          if [ -f "package.json" ]; then
            echo "has_node=true" >> $GITHUB_OUTPUT
          fi
          if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
            echo "has_python=true" >> $GITHUB_OUTPUT
          fi
          if [ -f "go.mod" ]; then
            echo "has_go=true" >> $GITHUB_OUTPUT
          fi
          if [ -f "Cargo.toml" ]; then
            echo "has_rust=true" >> $GITHUB_OUTPUT
          fi
          # Read node version from .nvmrc or default to 20
          if [ -f ".nvmrc" ]; then
            echo "node_version=$(cat .nvmrc | tr -d 'v')" >> $GITHUB_OUTPUT
          else
            echo "node_version=20" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.detect.outputs.node_version }}
          cache: 'npm'
        if: steps.detect.outputs.has_node == 'true'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
        if: steps.detect.outputs.has_python == 'true'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
        if: steps.detect.outputs.has_go == 'true'

      - name: Install Node dependencies
        run: npm ci
        if: steps.detect.outputs.has_node == 'true'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
          if [ -f "pyproject.toml" ]; then pip install -e ".[dev]" 2>/dev/null || pip install -e .; fi
        if: steps.detect.outputs.has_python == 'true'

      - name: Run task verification script
        run: |
          if [ -f "./src/scripts/verify-task.sh" ]; then
            chmod +x ./src/scripts/verify-task.sh
            ./src/scripts/verify-task.sh
          else
            echo "verify-task.sh not found, skipping"
          fi
        timeout-minutes: 10

      - name: Verify documentation completeness
        run: |
          echo "Checking documentation..."

          # Check if IMPLEMENTATION_PLAN.md exists in root (indicates active task)
          if [ -f "IMPLEMENTATION_PLAN.md" ]; then
            echo "Active task detected: IMPLEMENTATION_PLAN.md exists"

            if [ ! -f "CHECKLIST.md" ]; then
              echo "IMPLEMENTATION_PLAN.md exists but CHECKLIST.md is missing"
              exit 1
            fi

            if ! grep -qE "Status:.*(DONE|READY_FOR_REVIEW)" IMPLEMENTATION_PLAN.md; then
              echo "IMPLEMENTATION_PLAN.md status is not DONE or READY_FOR_REVIEW"
              echo "If this is a work-in-progress PR, this is expected"
            fi
          else
            echo "No active task in root (clean state)"
          fi

          if [ ! -f "README.md" ]; then
            echo "README.md not found"
            exit 1
          fi

          echo "Documentation checks passed"

      - name: Check ADR index consistency
        run: |
          if [ -d "docs/adr" ] && [ -f "docs/adr/README.md" ]; then
            adr_files=$(find docs/adr -name "*.md" ! -name "README.md" ! -name "*example*" 2>/dev/null | wc -l | tr -d ' ')
            # Count links in README (more robust than counting pipe chars)
            readme_entries=$(grep -cE "\[.*\]\(.*\.md\)" docs/adr/README.md 2>/dev/null || echo 0)

            if [ "$adr_files" -gt "$readme_entries" ]; then
              echo "Found $adr_files ADR files but only $readme_entries entries in README"
              echo "Update docs/adr/README.md when creating ADRs"
            else
              echo "ADR index is up to date"
            fi
          fi

  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -sI https://github.com/gitleaks/gitleaks/releases/latest | grep -i '^location:' | sed 's|.*/v||' | tr -d '\r')
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz
          sudo mv gitleaks /usr/local/bin/

      - name: Scan for secrets
        run: |
          echo "Scanning for secrets with gitleaks..."
          gitleaks detect --source . --no-git --redact -v || {
            echo "Secrets detected in codebase"
            echo "Use environment variables instead of hardcoding secrets"
            exit 1
          }
          echo "No secrets detected"

      - name: Check for .env files in git
        run: |
          if git ls-files | grep -q "\.env$"; then
            echo ".env file is tracked in git"
            echo "Add .env to .gitignore and remove from git history"
            exit 1
          fi
          echo "No .env files tracked in git"

      - name: Dependency audit
        run: |
          if [ -f "package.json" ]; then
            npm audit --production 2>/dev/null || echo "npm audit found issues — review above"
          fi
          if [ -f "requirements.txt" ]; then
            pip install pip-audit 2>/dev/null && pip-audit -r requirements.txt || echo "pip-audit found issues"
          fi
          if [ -f "Cargo.toml" ]; then
            cargo install cargo-audit 2>/dev/null && cargo audit || echo "cargo-audit found issues"
          fi
        continue-on-error: true

  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for anti-patterns
        run: |
          echo "Checking for anti-patterns..."
          ISSUES=0

          # Check for debug statements in source
          SRC_DIR="src"
          if [ -d "$SRC_DIR" ]; then
            DEBUG_STMTS=$(grep -rn "console\.log\|console\.debug" "$SRC_DIR" \
              --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" 2>/dev/null \
              | grep -v "//.*console\." \
              | grep -v "\.test\." \
              | grep -v "\.spec\." \
              | wc -l | tr -d ' ')

            if [ "$DEBUG_STMTS" -gt 0 ]; then
              echo "Found $DEBUG_STMTS debug statements in source code"
              ISSUES=$((ISSUES + 1))
            fi
          fi

          # Check for hardcoded credentials
          CRED_MATCHES=$(grep -rE "(password|passwd|pwd)[[:space:]]*[:=][[:space:]]*['\"][^'\"]{4,}" \
            --include="*.ts" --include="*.js" --include="*.py" --include="*.go" --include="*.rs" \
            . 2>/dev/null \
            | grep -v "process\.env\|os\.environ\|os\.Getenv\|env::var" \
            | grep -v "node_modules\|venv\|target" \
            | grep -v "//\|#" \
            || true)
          if [ -n "$CRED_MATCHES" ]; then
            echo "Possible hardcoded credentials found"
            ISSUES=$((ISSUES + 1))
          fi

          if [ "$ISSUES" -gt 0 ]; then
            echo "Anti-pattern issues found: $ISSUES"
            exit 1
          fi

          echo "No anti-patterns detected"

  notify:
    name: Report Status
    runs-on: ubuntu-latest
    needs: [verify, security, quality]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          echo "Workflow Results:"
          echo "  Verification: ${{ needs.verify.result }}"
          echo "  Security: ${{ needs.security.result }}"
          echo "  Quality: ${{ needs.quality.result }}"

          if [ "${{ needs.verify.result }}" != "success" ] || [ "${{ needs.security.result }}" != "success" ]; then
            echo "Some critical checks failed"
            exit 1
          fi

          echo "All critical checks passed"
